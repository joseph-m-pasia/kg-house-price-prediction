# config.yaml
data:
  # Folders
  raw_path: "src/pkg_house_prices/data/raw/"             # folder containing original raw data files
  processed_path: "src/pkg_house_prices/data/processed/" # folder to store cleaned/processed data
  external_path: "src/pkg_house_prices/data/external/"   # optional: external datasets
  final_output_path: "src/pkg_house_prices/data/outputs/"    # folder for final outputs (predictions, reports)
  train: "src/pkg_house_prices/data/raw/train.csv"       # train data file 
  test: "src/pkg_house_prices/data/raw/test.csv"         # test data file  
  target: "SalePrice"                                    # target variable name  
  test_size: 0.2                                         # proportion of data to use for testing                  

features:
  # Specific files
  train_features_path: "src/pkg_house_prices/features/features_train.csv"  # processed training features
  test_features_path: "src/pkg_house_prices/features/features_test.csv"    # processed test features
  selected_features_path: "src/pkg_house_prices/features/selected_features.csv"  # optional: after feature selection
  simple_imputer_strategy: "mean"                                          # strategy for SimpleImputer (mean, median, most_frequent, constant)

models:
  output_path: "src/pkg_house_prices/models/trained_models/"                          # Folder for saving trained models

training:
  random_seed: 42
  n_estimators: 100
  max_depth: 10
  test_size: 0.2

params:
  # Hyperparameters for model training
  learning_rate: 0.01
  batch_size: 32
  epochs: 100
  missing_threshold: 0.0                         # threshold for dropping columns with too many missing values
  regressor_alpha: [0.01, 0.1, 1.0, 10.0, 100.0] # list of alpha values for regularization tuning
  regressor__l1_ratio: [0.1, 0.5, 0.9]           # list of l1_ratio values for ElasticNet tuning 
  cv_size: 10                                    # number of folds for cross-validation
  xgb_n_estimators: [50, 100, 200]               # number of trees for XGBoost
  xgb_max_depth: [3, 6, 9]                       # maximum depth of trees for XGBoost
  xgb_learning_rate: [0.01, 0.1, 0.2]            # learning rate for XGBoost    

diagnostics:
  to_plot: true                         # whether to generate diagnostic plots
  diagnostics_output_path: "src/pkg_house_prices/data/outputs/diagnostics/"  # folder to save diagnostic outputs (plots, metrics)     

runtype:
  prod_run: false                    # true if running as production module, false if running in notebook

logging:
  log_path: "logs/training.log"      # path to save logs
